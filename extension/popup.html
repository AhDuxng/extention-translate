<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Viet Translator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: #fbfcff;
      color: #253244;
      font-size: 13px;
    }

    .popup-header {
      padding: 16px;
      background: #eef6f6;
      border-bottom: 1px solid #d8e8e8;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 750;
      color: #23364a;
    }

    .popup-subtitle {
      font-size: 11px;
      color: #5c7085;
      margin-top: 3px;
      line-height: 1.35;
    }

    .popup-section {
      padding: 14px 16px;
      border-bottom: 1px solid #e8edf3;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #66758a;
      margin-bottom: 8px;
    }

    .toggle-row,
    .cache-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-label {
      font-size: 13px;
      color: #2f3d4f;
      font-weight: 650;
    }

    .toggle-desc,
    .cache-count {
      font-size: 12px;
      color: #718096;
      margin-top: 3px;
      line-height: 1.35;
    }

    .cache-count span {
      color: #426a5a;
      font-weight: 700;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #e8edf3;
      border: 1px solid #d8e1ec;
      transition: 0.2s;
      border-radius: 999px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background-color: #ffffff;
      border: 1px solid #d8e1ec;
      transition: 0.2s;
      border-radius: 50%;
      box-shadow: 0 1px 3px rgba(40, 54, 72, 0.12);
    }

    input:checked+.slider {
      background-color: #cfe8dc;
      border-color: #a8d5bf;
    }

    input:checked+.slider:before {
      transform: translateX(18px);
      border-color: #9acdaf;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 650;
      padding: 4px 8px;
      border-radius: 6px;
      margin-top: 9px;
    }

    .status-badge.active {
      background: #e3f3e8;
      color: #426a5a;
      border: 1px solid #cde6d5;
    }

    .status-badge.inactive {
      background: #eef1f5;
      color: #6b7280;
      border: 1px solid #d8e1ec;
    }

    .dir-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #f3f6fa;
      border: 1px solid #d8e1ec;
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }

    .dir-btn,
    .btn-clear,
    .btn-save {
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .dir-btn {
      padding: 6px 4px;
      color: #66758a;
      background: transparent;
    }

    .dir-btn:hover {
      color: #253244;
      background: #ffffff;
    }

    .dir-btn.active {
      background: #dfeef5;
      color: #2d4a5f;
      border-color: #c8dfe9;
    }

    .btn-clear,
    .btn-save {
      padding: 7px 10px;
      background: #fbf8ef;
      border-color: #eadfca;
      color: #6a5a37;
    }

    .btn-clear:hover,
    .btn-save:hover {
      background: #f4ecd8;
      border-color: #dccaa9;
    }

    .btn-clear:disabled,
    .btn-save:disabled {
      opacity: 0.62;
      cursor: default;
    }

    .backend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .backend-input {
      min-width: 0;
      flex: 1;
      height: 32px;
      border: 1px solid #d8e1ec;
      border-radius: 6px;
      background: #ffffff;
      color: #253244;
      font-size: 12px;
      padding: 0 9px;
      outline: none;
    }

    .backend-input:focus {
      border-color: #9fc7d8;
      box-shadow: 0 0 0 3px rgba(159, 199, 216, 0.18);
    }

    .popup-footer {
      padding: 10px 16px;
      background: #f6f8fb;
    }

    .popup-footer p {
      font-size: 11px;
      color: #718096;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="popup-header">
    <div class="popup-title">Quick Viet Translator</div>
    <div class="popup-subtitle">Dịch paper công nghệ thông tin với văn phong học thuật.</div>
  </div>

  <div class="popup-section">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Tự động dịch</div>
        <div class="toggle-desc">Bôi đen thuật ngữ, câu hoặc đoạn ngắn.</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggle-enabled" checked />
        <span class="slider"></span>
      </label>
    </div>
    <div id="status-badge" class="status-badge active">
      <span id="status-text">Đang hoạt động</span>
    </div>
  </div>

  <div class="popup-section">
    <div class="section-label">Chiều dịch</div>
    <div class="dir-selector" id="dir-selector">
      <button class="dir-btn active" id="btn-auto" data-dir="auto">Auto</button>
      <button class="dir-btn" id="btn-en-vi" data-dir="en-vi">EN → VI</button>
      <button class="dir-btn" id="btn-vi-en" data-dir="vi-en">VI → EN</button>
    </div>
  </div>

  <div class="popup-section">
    <div class="cache-info">
      <div>
        <div class="toggle-label">Cache bản dịch</div>
        <div class="cache-count">Đã lưu: <span id="cache-count">0</span></div>
      </div>
      <button class="btn-clear" id="btn-clear-cache">Xóa cache</button>
    </div>
  </div>

  <div class="popup-section">
    <div class="section-label">Backend</div>
    <div class="backend-row">
      <input class="backend-input" id="backend-url" type="url" spellcheck="false" />
      <button class="btn-save" id="btn-save-backend">Lưu</button>
    </div>
  </div>

  <div class="popup-footer">
    <p>API key chỉ được cấu hình ở backend.</p>
  </div>

  <script src="popup.js"></script>
</body>

</html>
